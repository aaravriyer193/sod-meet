<!DOCTYPE html>
<html>
<head>
    <title>SODMeet | Secure, Free Video Meetings</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Nunito'; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .hero { text-align: center; max-width: 600px; padding: 40px; }
        .logo { width: 120px; height: 120px; border-radius: 70px; box-shadow: 0 0 30px rgba(255, 140, 0, 0.4); }
        h1 { font-size: 3.5rem; margin: 0; color: #FF8C00; }
        p { color: #aaa; font-size: 1.2rem; margin-bottom: 40px; }
        .btn { background: #FF8C00; color: #000; padding: 18px 45px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 1.2rem; transition: 0.3s; display: inline-block; box-shadow: 0 10px 20px rgba(255, 140, 0, 0.2); }
        .btn:hover { background: #ff9d26; transform: translateY(-3px); box-shadow: 0 15px 25px rgba(255, 140, 0, 0.4); }
    </style>
</head>
<body>
    <div class="hero">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo" alt="SODMeet Logo">
        <h1>SODMeet</h1>
        <p>Unlimited high-quality video meetings for everyone. No time limits, no hidden fees.</p>
        <a href="/join" class="btn">Start a Meeting</a>
    </div>
</body>
</html>
