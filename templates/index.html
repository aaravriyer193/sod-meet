<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SODMeet | {{ room_id }}</title>
    <link rel="icon" href="{{ url_for('static', filename='logo.png') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    
    <style>
        :root { --orange: #FF8C00; --bg: #0a0a0a; --panel: #1a1a1a; --red: #ea4335; }
        
        /* Font Fix: Force forms to use Nunito */
        body, input, button { font-family: 'Nunito', sans-serif; margin: 0; }
        body { background: var(--bg); color: white; height: 100vh; overflow: hidden; }

        /* Name Prompt Overlay */
        #name-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .name-card { background: var(--panel); padding: 40px; border-radius: 24px; border: 1px solid var(--orange); text-align: center; width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .name-card img { width: 80px; margin-bottom: 20px; border-radius: 15px; }
        
        /* Input Alignment & Polish */
        .name-card input { 
            width: 100%; padding: 16px; margin: 20px 0; border-radius: 12px; 
            border: 2px solid #333; background: #000; color: white; 
            font-size: 1.1rem; text-align: center; outline: none; 
            box-sizing: border-box; transition: 0.3s; font-weight: 600;
        }
        .name-card input:focus { border-color: var(--orange); box-shadow: 0 0 15px rgba(255,140,0,0.2); }
        
        .join-btn { background: var(--orange); color: black; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        .join-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,140,0,0.3); }

        /* Video Grid */
        #video-grid { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px; padding: 20px; height: calc(100vh - 90px); box-sizing: border-box; overflow-y: auto; }
        .video-wrapper { position: relative; flex: 1 1 45%; min-width: 300px; max-width: 600px; aspect-ratio: 16/9; background: #111; border-radius: 16px; overflow: hidden; border: 2px solid transparent; }
        .video-wrapper.active { border-color: var(--orange); }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* Avatar Placeholder */
        .avatar-view { position: absolute; inset: 0; background: #222; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5; }
        .cam-off .avatar-view { display: flex; }
        .initials { width: 80px; height: 80px; background: var(--orange); color: black; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; }
        .name-tag { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; z-index: 10; border-left: 2px solid var(--orange); }

        /* Invite Popup */
        #invite-popup { position: fixed; left: 20px; bottom: 100px; width: 320px; background: white; color: #121212; padding: 25px; border-radius: 12px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 500; display: none; }
        #invite-popup h3 { margin-top: 0; color: #121212; font-size: 1.1rem; }
        .link-box { background: #f1f3f4; padding: 12px; border-radius: 8px; font-family: monospace; font-size: 0.9rem; word-break: break-all; margin: 15px 0; border: 1px solid #ddd; }

        /* Controls Bar */
        #controls { position: fixed; bottom: 0; width: 100%; height: 80px; background: #111; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; border-top: 1px solid #333; z-index: 100; }
        .ctrl-group { display: flex; gap: 15px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: #2a2a2a; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: 0.2s; }
        .circle-btn:hover { background: #3a3a3a; transform: scale(1.05); }
        .circle-btn.red { background: var(--red); }
        .circle-btn.red:hover { background: #ff5242; }
        .circle-btn.active { background: var(--orange); color: black; }

        /* Chat Sidebar */
        #chat-sidebar { position: fixed; top: 0; right: -360px; width: 350px; height: calc(100vh - 80px); background: var(--panel); border-left: 2px solid var(--orange); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; display: flex; flex-direction: column; }
        #chat-sidebar.open { right: 0; box-shadow: -10px 0 30px rgba(0,0,0,0.5); }
        #chat-msgs { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { background: #2a2a2a; padding: 10px 15px; border-radius: 12px; align-self: flex-start; max-width: 85%; font-size: 0.9rem; }
        .msg-bubble.me { background: rgba(255,140,0,0.1); border: 1px solid rgba(255,140,0,0.3); align-self: flex-end; }
        .chat-input { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        .chat-input input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 20px; outline: none; }
        .chat-input input:focus { border-color: var(--orange); }

        #warning { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); background: var(--red); color: white; padding: 8px 20px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; display: none; z-index: 3000; box-shadow: 0 5px 15px rgba(234,67,53,0.4); }
    </style>
</head>
<body>

    <div id="name-overlay">
        <div class="name-card">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo">
            <h2>Ready to join?</h2>
            <input type="text" id="username" placeholder="Enter your name" maxlength="20" autofocus onkeypress="if(event.key==='Enter') joinRoom()">
            <button class="join-btn" onclick="joinRoom()">Join SODMeet</button>
        </div>
    </div>

    <div id="warning">⚠️ Large Meeting: Connection may lag with 4+ people.</div>

    <div id="video-grid">
        <div class="video-wrapper" id="local-wrapper">
            <div class="avatar-view"><div class="initials" id="local-init">?</div></div>
            <div class="name-tag" id="local-tag">You</div>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
    </div>

    <div id="invite-popup">
        <span style="float:right; cursor:pointer; font-size: 1.2rem; color: #555;" onclick="toggleInvite()">×</span>
        <h3>Your meeting is ready</h3>
        <p style="font-size: 0.85rem; color: #555; margin-bottom: 5px;">Share this link to invite others:</p>
        <div class="link-box" id="meet-link"></div>
        <button onclick="copyLink()" style="width:100%; padding:12px; background:var(--orange); border:none; border-radius:8px; cursor:pointer; font-weight:bold; color:black; font-size:1rem; transition:0.2s;">Copy Link</button>
    </div>

    <div id="chat-sidebar">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #333; color: var(--orange); display:flex; justify-content:space-between;">
            <span>In-call Messages</span>
            <span style="cursor:pointer; color:white;" onclick="toggleChat()">×</span>
        </div>
        <div id="chat-msgs"></div>
        <div class="chat-input">
            <input type="text" id="chatIn" placeholder="Send a message..." onkeypress="if(event.key==='Enter') sendChat()">
        </div>
    </div>

    <div id="controls">
        <div style="color: #888; font-weight: bold; font-size: 1.1rem;">SODMeet | <span id="clock"></span></div>
        
        <div class="ctrl-group">
            <button class="circle-btn" id="micBtn" onclick="toggleMic()"><ion-icon name="mic-outline"></ion-icon></button>
            <button class="circle-btn" id="camBtn" onclick="toggleCam()"><ion-icon name="videocam-outline"></ion-icon></button>
            <button class="circle-btn" id="shareBtn" onclick="toggleScreen()"><ion-icon name="desktop-outline"></ion-icon></button>
            <button class="circle-btn red" onclick="window.location.href='/'" style="width:70px; border-radius:25px;"><ion-icon name="call-outline"></ion-icon></button>
        </div>

        <div class="ctrl-group">
            <button class="circle-btn" onclick="toggleInvite()"><ion-icon name="information-circle-outline"></ion-icon></button>
            <button class="circle-btn" onclick="toggleChat()"><ion-icon name="chatbubble-outline"></ion-icon></button>
        </div>
    </div>

<script>
    const socket = io();
    const room = "{{ room_id }}";
    const myId = Math.random().toString(36).substring(7);
    let myName = "";
    let localStream, screenStream;
    let peers = {}; 
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    document.getElementById('meet-link').innerText = window.location.href;

    async function joinRoom() {
        myName = document.getElementById('username').value.trim() || "Guest";
        document.getElementById('name-overlay').style.display = 'none';
        document.getElementById('local-init').innerText = myName[0].toUpperCase();
        document.getElementById('local-tag').innerText = myName + " (You)";
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            
            socket.emit('join-room', { room, userId: myId, name: myName });
            toggleInvite(); 
        } catch(e) {
            alert("Camera/Mic access denied. Please allow permissions to join.");
        }
    }

    socket.on('user-joined', data => {
        console.log("Peer joined:", data.name);
        initConnection(data.userId, data.name, true);
    });

    socket.on('signal', async data => {
        if (!peers[data.sender]) initConnection(data.sender, data.senderName || "Guest", false);
        const pc = peers[data.sender].pc;

        if (data.sdp) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            if (data.sdp.type === 'offer') {
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                socket.emit('signal', { target: data.sender, sender: myId, sdp: pc.localDescription });
            }
        } else if (data.candidate) {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        }
    });

    function initConnection(partnerId, partnerName, isCaller) {
        const pc = new RTCPeerConnection(config);
        peers[partnerId] = { pc, name: partnerName };
        
        localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

        pc.onicecandidate = e => {
            if(e.candidate) socket.emit('signal', { target: partnerId, sender: myId, candidate: e.candidate });
        };

        pc.ontrack = e => {
            if (document.getElementById(`vid-${partnerId}`)) return;
            const grid = document.getElementById('video-grid');
            const wrap = document.createElement('div');
            wrap.className = 'video-wrapper active';
            wrap.id = `wrap-${partnerId}`;
            wrap.innerHTML = `
                <div class="avatar-view"><div class="initials">${partnerName[0].toUpperCase()}</div></div>
                <div class="name-tag">${partnerName}</div>
                <video id="vid-${partnerId}" autoplay playsinline></video>
            `;
            grid.appendChild(wrap);
            document.getElementById(`vid-${partnerId}`).srcObject = e.streams[0];
            updateGrid();
        };

        if (isCaller) {
            pc.createOffer().then(o => {
                pc.setLocalDescription(o);
                socket.emit('signal', { target: partnerId, sender: myId, senderName: myName, sdp: o });
            });
        }
    }

    function toggleCam() {
        const v = localStream.getVideoTracks()[0];
        v.enabled = !v.enabled;
        document.getElementById('local-wrapper').classList.toggle('cam-off', !v.enabled);
        const btn = document.getElementById('camBtn');
        btn.classList.toggle('active', !v.enabled);
        btn.innerHTML = v.enabled ? '<ion-icon name="videocam-outline"></ion-icon>' : '<ion-icon name="videocam-off-outline"></ion-icon>';
    }

    function toggleMic() {
        const a = localStream.getAudioTracks()[0];
        a.enabled = !a.enabled;
        const btn = document.getElementById('micBtn');
        btn.classList.toggle('active', !a.enabled);
        btn.innerHTML = a.enabled ? '<ion-icon name="mic-outline"></ion-icon>' : '<ion-icon name="mic-off-outline"></ion-icon>';
    }

    async function toggleScreen() {
        const btn = document.getElementById('shareBtn');
        if (!screenStream) {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                const track = screenStream.getVideoTracks()[0];
                Object.values(peers).forEach(p => {
                    const sender = p.pc.getSenders().find(s => s.track.kind === 'video');
                    if(sender) sender.replaceTrack(track);
                });
                document.getElementById('localVideo').srcObject = screenStream;
                btn.classList.add('active');
                track.onended = () => toggleScreen(); 
            } catch(e) { console.error("Screen share canceled", e); }
        } else {
            const track = localStream.getVideoTracks()[0];
            Object.values(peers).forEach(p => {
                const sender = p.pc.getSenders().find(s => s.track.kind === 'video');
                if(sender) sender.replaceTrack(track);
            });
            document.getElementById('localVideo').srcObject = localStream;
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
            btn.classList.remove('active');
        }
    }

    function updateGrid() {
        const count = document.querySelectorAll('.video-wrapper').length;
        document.getElementById('warning').style.display = count > 4 ? 'block' : 'none';
    }

    function toggleInvite() { 
        const p = document.getElementById('invite-popup');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    }

    function toggleChat() { 
        document.getElementById('chat-sidebar').classList.toggle('open'); 
    }

    function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        const btn = document.querySelector('#invite-popup button');
        btn.innerText = "Copied!";
        btn.style.background = "#4CAF50";
        setTimeout(() => {
            btn.innerText = "Copy Link";
            btn.style.background = "var(--orange)";
        }, 2000);
    }

    function sendChat() {
        const i = document.getElementById('chatIn');
        if (i.value.trim()) {
            socket.emit('chat-msg', { room, user: myName, msg: i.value });
            i.value = '';
        }
    }

    socket.on('chat-msg', data => {
        const m = document.getElementById('chat-msgs');
        const isMe = data.user === myName;
        m.innerHTML += `<div class="msg-bubble ${isMe ? 'me' : ''}"><b>${isMe ? 'You' : data.user}:</b><br>${data.msg}</div>`;
        m.scrollTop = m.scrollHeight;
        if (!document.getElementById('chat-sidebar').classList.contains('open') && !isMe) toggleChat();
    });

    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }, 1000);
</script>
</body>
